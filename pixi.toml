[workspace]
channels = ["conda-forge", "nmarticorena"]
name = "unitree_sim_isaaclab"
platforms = ["linux-64"]
version = "0.1.0"
# Trick from https://github.com/garylvov/pixidock_template
conda-pypi-map = { "conda-forge" = "conda_pypi_map.json" }

[activation]
scripts = ["patch_lib.sh"]


[system-requirements]
cuda="12.6"
libc = "2.35"

[pypi-options]
extra-index-urls = ["https://pypi.nvidia.com"]
no-build-isolation = false

[tasks]
run-sim = {cmd = "python sim_main.py --device cpu  --enable_cameras  --task  Isaac-PickPlace-RedBlock-G129-Inspire-Joint   --enable_inspire_dds --robot_type g129   --device=cuda --action_source dds --headless"}

[dependencies]
python = "3.11.*"
pytorch = {version = "==2.7.0", build = "cuda126*"}
torchvision = "==0.22.0"
torchaudio = "==2.7.0"
cuda = "12.6.*"
cyclonedds = {channel = "nmarticorena"}

# Need newer GCC/binutils to work with glibc 2.39's .relr.dyn sections
gxx = "11.3.*"
gcc = "11.3.*"
cmake = ">=4.2.2,<5"


# isaacsim pinned versions
typing-extensions= "==4.12.2"
numpy= "==1.26.0"
pillow = "==11.3.0"
sympy= "==1.13.3"
networkx= "==3.3"
fsspec= "==2024.6.1"
filelock= "==3.13.1"
markupsafe= "==2.1.3"
pywin32= "==306"
pip = ">=25.3,<26"
libstdcxx-ng = ">=15.2.0,<16"
libstdcxx = ">=15.2.0,<16"
cuda-nvcc = ">=12.6.85,<13"
compilers = ">=1.5.2,<2"
git-lfs = ">=3.7.1,<4"
#aiortc = ">=1.5,<1.7"
cryptography = "==44.0.0"
rerun-sdk = ">=0.28.2,<0.29"
ipywidgets = "==8.1.5"
wrapt = "==1.16.0"
attrs = "==25.1.0"
onnxruntime = ">=1.22.2,<2"
packaging = "==23.0"
toml = ">=0.10.2,<0.11"
openssl = ">=3.6.0,<4"
aiohttp = "==3.11.11"
aiosignal = "==1.3.2"
propcache= "==0.2.1"
aiohappyeyeballs = "==2.4.4"
frozenlist = "==1.5.0"
idna = "==3.10"
yarl = "==1.18.3"
multidict = "==6.1.0"
opencv = ">=4.12.0,<5"


[pypi-dependencies]
isaacsim= {version = "==5.1.0", extras = ["all", "extscache"]}



isaaclab        = { path = "IsaacLab/source/isaaclab", editable = true }
isaaclab-assets = { path = "IsaacLab/source/isaaclab_assets", editable = true }
isaaclab-tasks  = { path = "IsaacLab/source/isaaclab_tasks", editable = true }
isaaclab-rl     = { path = "IsaacLab/source/isaaclab_rl", editable = true }
isaaclab-mimic  = { path = "IsaacLab/source/isaaclab_mimic", editable = true }


teleimager = {path = "teleimager", editable = true}
unitree-sdk2py = {path = "unitree_sdk2_python/", editable = true}
skrl = ">=1.4.3, <2"
# aiortc = "==1.9.0"
aiortc = ">=1.14.0, <2"
